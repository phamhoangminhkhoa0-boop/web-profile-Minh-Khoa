<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Xác Thực Danh Tính Người Nhà</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --accent: #A98467;
            --accent-hover: #937053;
            --text-light: #FFFFFF;
        }

        body {
            margin: 0; 
            font-family: 'Comfortaa', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://i.pinimg.com/736x/30/51/0d/30510d195488ce7dba3259c0c414170c.jpg') no-repeat center center fixed;
            background-size: cover; 
            display: flex; 
            flex-direction: column; /* Chuyển hướng xếp theo chiều dọc */
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* KHUNG CHỨA CẢ CARD ĐỂ CANH GIỮA HOÀN HẢO */
        .wrapper-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        /* THIẾT KẾ CARD MỜ ẢO (GLASSMORPHISM) ĐỒNG BỘ TRANG CHỦ */
        .gate-card {
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15); 
            padding: 40px; 
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); 
            max-width: 400px; 
            width: 100%; 
            text-align: center;
            box-sizing: border-box;
        }

        .gate-title { 
            font-family: 'Montserrat', sans-serif; 
            font-size: 1.4rem; 
            color: var(--text-light); 
            margin-bottom: 30px; 
            letter-spacing: 0.5px; 
            text-transform: uppercase;
        }

        .form-group { margin-bottom: 20px; text-align: left; }
        
        .form-group label { 
            display: block; 
            font-weight: bold; 
            font-size: 0.85rem; 
            color: rgba(255, 255, 255, 0.85); 
            margin-bottom: 8px; 
        }

        .form-control { 
            width: 100%; 
            padding: 13px 15px; 
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15); 
            border-radius: 12px; 
            font-family: 'Comfortaa', sans-serif; 
            box-sizing: border-box; 
            font-size: 0.9rem; 
            color: var(--text-light);
            transition: all 0.3s ease;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .form-control:focus { 
            outline: none; 
            border-color: var(--accent); 
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 10px rgba(169, 132, 103, 0.3);
        }

        .btn-submit { 
            background: var(--accent); 
            color: white; 
            border: none; 
            width: 100%; 
            padding: 14px; 
            border-radius: 12px; 
            font-weight: bold; 
            font-family: 'Comfortaa', sans-serif; 
            cursor: pointer; 
            margin-top: 10px; 
            font-size: 0.95rem; 
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(169, 132, 103, 0.3);
        }

        .btn-submit:hover { 
            background: var(--accent-hover); 
            transform: translateY(-1px);
        }

        .btn-back { 
            display: inline-block; 
            margin-top: 25px; 
            color: rgba(255, 255, 255, 0.6); 
            text-decoration: none; 
            font-size: 0.85rem; 
            font-weight: bold; 
            transition: color 0.3s;
        }
        
        .btn-back:hover {
            color: var(--text-light);
        }
        
        .error-alert-box { 
            background: rgba(231, 76, 60, 0.15); 
            color: #ff7675; 
            padding: 12px 16px; 
            border-radius: 12px; 
            font-weight: bold; 
            font-size: 0.85rem; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            margin-bottom: 25px; 
            border: 1px solid rgba(231, 76, 60, 0.3); 
            border-left: 4px solid #e74c3c; 
            text-align: left; 
            backdrop-filter: blur(5px);
        }

        /* ĐÃ ĐỒNG BỘ ĐÚNG CLASS THEO TRANG INDEX */
        .footer-copyright {
            width: 100%;
            text-align: center;
            padding: 20px 15px;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.5); /* Nền đen mờ nhẹ ôm đáy trang cực sang */
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .footer-copyright span {
            margin-left: 15px;
            opacity: 0.6;
            font-family: 'Comfortaa', sans-serif;
            font-weight: 400;
        }
    </style>
</head>
<body>

    <div class="wrapper-content">
        <div class="gate-card">
            <div class="gate-title">
                <i class="fa-solid fa-people-roof" style="color: #FFD54F; margin-right: 5px;"></i> XÁC THỰC NGƯỜI NHÀ
            </div>
            
            {% if global_error %}
            <div class="error-alert-box">
                <i class="fa-solid fa-circle-xmark" style="font-size: 1.1rem;"></i>
                <span>{{ global_error }}</span>
            </div>
            {% endif %}

            <form action="/family-gate" method="POST">
                <div class="form-group">
                    <label>Tên của bạn (Thành viên gia đình):</label>
                    <input type="text" name="member_name" class="form-control" placeholder="Nhập tên của bạn vào đây..." required oninvalid="this.setCustomValidity('Phần này là bắt buộc, không được để trống!')" oninput="this.setCustomValidity('')">
                </div>
                <div class="form-group">
                    <label><i class="fa-solid fa-key"></i> Bảo mật mã PIN chung:</label>
                    <input type="password" name="shared_code" class="form-control" placeholder="Nhập mã PIN..." required oninvalid="this.setCustomValidity('Mật khẩu không được để trống!')" oninput="this.setCustomValidity('')">
                </div>
                <button type="submit" class="btn-submit">Xác nhận mã PIN & Tiến vào</button>
            </form>
            <a href="/" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Quay lại trang chính</a>
        </div>
    </div>

    <div class="footer-copyright">
        Create by Minh Khoa <span>Phiên bản: 2.1</span>
    </div>

</body>
</html>
