<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Xác Thực Quản Trị - Lớp 2</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --accent: #A98467;
            --text-light: #FFFFFF;
            --danger: #E74C3C;
        }
        
        body {
            margin: 0;
            font-family: 'Comfortaa', sans-serif;
            /* Phủ lớp tối 65% giúp nổi bật khung đăng nhập kính mờ */
            background: linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.65)), 
                        url('{{ info.bg_url if info and info.bg_url else "https://i.pinimg.com/736x/30/51/0d/30510d195488ce7dba3259c0c414170c.jpg" }}') no-repeat center center/cover fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column; /* Thêm để xếp dọc hộp đăng nhập và footer */
            justify-content: center;
            align-items: center;
            color: var(--text-light);
            box-sizing: border-box;
        }

        /* Khung bọc đệm trung gian giữ khối login nằm giữa khang trang */
        .wrapper-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 40px 20px;
            box-sizing: border-box;
        }
        
        .login-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 45px 40px;
            border-radius: 24px;
            width: 85%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            animation: fadeIn 0.6s ease;
            box-sizing: border-box;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header i {
            font-size: 3rem;
            color: var(--accent);
            margin-bottom: 15px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
        }
        .login-header h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.6rem;
            font-weight: 900;
            margin: 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            letter-spacing: -0.5px;
        }
        
        .form-group {
            position: relative;
            margin-bottom: 20px;
        }
        .form-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.7);
            transition: color 0.3s;
        }
        .form-control {
            width: 100%;
            padding: 14px 15px 14px 45px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            font-family: 'Comfortaa', sans-serif;
            font-size: 0.95rem;
            color: white;
            box-sizing: border-box;
            transition: all 0.3s;
        }
        .form-control::placeholder { color: rgba(255, 255, 255, 0.5); }
        .form-control:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 10px rgba(169, 132, 103, 0.3);
        }
        .form-control:focus + i {
            color: var(--accent);
        }
        
        .btn-action {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            border: none;
            border-radius: 12px;
            color: white;
            font-family: 'Comfortaa', sans-serif;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .btn-action:hover {
            background: #937053;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(169, 132, 103, 0.4);
        }
        
        .error-alert {
            background: rgba(192, 57, 43, 0.3);
            border-left: 4px solid var(--danger);
            color: #FF8A80;
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: shake 0.4s ease;
        }
        
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 0.85rem;
            margin-top: 25px;
            width: 100%;
            justify-content: center;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--accent); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Đã sửa thêm dấu chấm class và đảm bảo full width */
        .footer-copyright {
            width: 100%;
            text-align: center;
            padding: 20px 15px;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.5); 
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .footer-copyright span {
            margin-left: 15px;
            opacity: 0.6;
            font-family: 'Comfortaa', sans-serif;
            font-weight: 400;
        }
    </style>
</head>
<body>

    <div class="wrapper-content">
        <div class="login-container">
            <div class="login-header">
                <i class="fa-solid fa-user-shield"></i>
                <h2>BẢO MẬT LỚP 2</h2>
                <p style="font-size:0.85rem; font-weight:bold; color: var(--accent); margin-top: 5px; text-transform: uppercase;">Xác thực tài khoản Admin</p>
            </div>

            {% if global_error %}
            <div class="error-alert">
                <i class="fa-solid fa-circle-xmark"></i>
                <span>{{ global_error }}</span>
            </div>
            {% endif %}

            <form method="POST" action="/login">
                <div class="form-group">
                    <input type="text" name="username" class="form-control" placeholder="Tên đăng nhập admin..." required autofocus>
                    <i class="fa-solid fa-user"></i>
                </div>
                
                <div class="form-group">
                    <input type="password" name="password" class="form-control" placeholder="Mật khẩu điều hành..." required>
                    <i class="fa-solid fa-key"></i>
                </div>

                <button type="submit" class="btn-action">
                    <i class="fa-solid fa-right-to-bracket"></i> Đăng Nhập Hệ Thống
                </button>
            </form>

            <a href="/" class="back-link"><i class="fa-solid fa-arrow-left-long"></i> Quay lại cổng chính</a>
        </div>
    </div>

    <div class="footer-copyright">
        Create by Minh Khoa <span>Phiên bản: 2.1</span>
    </div>

</body>
</html>
