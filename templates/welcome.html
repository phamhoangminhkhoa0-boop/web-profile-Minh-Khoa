<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>🌞🔆Hello !🌞🔆</title>
    <title>{{ info.title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --accent: #A98467;
            --text-light: #FFFFFF;
        }
        body {
            margin: 0;
            font-family: 'Comfortaa', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('{{ info.bg_url }}') no-repeat center center/cover fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column; /* Định hướng xếp dọc để đẩy footer xuống đáy */
            justify-content: center;
            align-items: center;
            color: var(--text-light);
            box-sizing: border-box;
        }
        
        /* Khung bọc giữ khối welcome nằm giữa màn hình */
        .wrapper-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .welcome-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 50px 40px;
            border-radius: 24px;
            text-align: center;
            max-width: 550px;
            width: 85%;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            animation: fadeIn 0.8s ease;
            box-sizing: border-box;
        }
        .avatar-welcome {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            margin: 0 0 10px 0;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .subtitle {
            font-size: 1rem;
            opacity: 0.9;
            margin: 0 0 35px 0;
            line-height: 1.5;
        }
        .gate-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .btn-gate {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 30px;
            border-radius: 14px;
            font-family: 'Comfortaa', sans-serif;
            font-weight: bold;
            font-size: 1rem;
            text-decoration: none;
            color: white;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        .btn-family {
            background: var(--accent);
        }
        .btn-family:hover {
            background: #937053;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(169, 132, 103, 0.4);
        }
        .btn-admin {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.25);
        }
        .btn-admin:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 255, 255, 0.15);
        }
        
        /* GIAO DIỆN MODAL POPUP ĐÒI MÃ PIN ADMIN */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .modal-box {
            background: #FFFFFF;
            color: #333333;
            padding: 35px 30px;
            border-radius: 20px;
            width: 85%;
            max-width: 340px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            animation: scaleUp 0.3s ease;
        }
        .modal-box h3 {
            font-family: 'Montserrat', sans-serif;
            margin: 0 0 8px 0;
            color: #2C3E50;
            font-size: 1.25rem;
            font-weight: 700;
        }
        .pin-input {
            width: 100%;
            padding: 14px;
            font-size: 1.6rem;
            text-align: center;
            font-weight: bold;
            border: 2px solid #E2E8F0;
            border-radius: 12px;
            box-sizing: border-box;
            font-family: 'Comfortaa';
            margin-bottom: 18px;
            letter-spacing: 6px;
            background: #F8FAFC;
        }
        .pin-input:focus {
            outline: none;
            border-color: var(--accent);
            background: #FFFFFF;
        }
        .btn-confirm-pin {
            background: #27AE60;
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 12px;
            font-weight: bold;
            font-family: 'Comfortaa';
            cursor: pointer;
            font-size: 1rem;
            margin-bottom: 10px;
            transition: background 0.2s;
        }
        .btn-confirm-pin:hover { background: #219653; }
        .btn-cancel-pin {
            background: #F1F5F9;
            color: #64748B;
            border: none;
            padding: 11px;
            width: 100%;
            border-radius: 12px;
            font-weight: bold;
            font-family: 'Comfortaa';
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s;
        }
        .btn-cancel-pin:hover { background: #E2E8F0; }
        .error-alert-box {
            background: #FFEBEE;
            color: #C0392B;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 0.8rem;
            display: none;
            align-items: center;
            gap: 8px;
            margin-bottom: 18px;
            text-align: left;
            border-left: 4px solid #C0392B;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleUp { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        /* Đã thêm dấu chấm (.) sửa lỗi định dạng Class */
        .footer-copyright {
            width: 100%;
            text-align: center;
            padding: 20px 15px;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.5); 
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .footer-copyright span {
            margin-left: 15px;
            opacity: 0.6;
            font-family: 'Comfortaa', sans-serif;
            font-weight: 400;
        }
    </style>
</head>
<body>

    <div class="wrapper-content">
        <div class="welcome-container">
            <img src="{{ info.avatar_url }}" alt="Avatar" class="avatar-welcome">
            <h1>Profile cá nhân của Phạm Hoàng Minh Khoa</h1>
            <p class="subtitle">{{ info.subtitle_custom }}</p>
            
            <div class="gate-options">
                <a href="/family-gate" class="btn-gate btn-family">
                    <i class="fa-solid fa-people-roof"></i> Đăng Nhập Gia Đình
                </a>
                <button onclick="openAdminPinModal()" class="btn-gate btn-admin">
                    <i class="fa-solid fa-user-gear"></i> Admin
                </button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="adminPinModal">
        <div class="modal-box">
            <h3><i class="fa-solid fa-lock" style="color: #64748B;"></i> MÃ PIN ADMIN</h3>
            <p style="font-size: 0.8rem; color: #64748B; margin-bottom: 15px; margin-top: 0;">Vui lòng nhập mã PIN xác thực hệ thống.</p>
            
            <div class="error-alert-box" id="modalErrorBox">
                <i class="fa-solid fa-circle-xmark" style="font-size: 1rem;"></i>
                <span id="errorMsgText">Lỗi</span>
            </div>

            <input type="password" id="adminPinInputField" class="pin-input" placeholder="••••" maxlength="6">
            <button class="btn-confirm-pin" onclick="submitAdminPin()">Xác Nhận</button>
            <button class="btn-cancel-pin" onclick="closeAdminPinModal()">Hủy Bỏ</button>
        </div>
    </div>

    <script>
        function openAdminPinModal() {
            document.getElementById("adminPinInputField").value = "";
            document.getElementById("modalErrorBox").style.display = "none";
            document.getElementById("adminPinModal").style.display = "flex";
            document.getElementById("adminPinInputField").focus();
        }
        function closeAdminPinModal() {
            document.getElementById("adminPinModal").style.display = "none";
        }
        function submitAdminPin() {
            const pinVal = document.getElementById("adminPinInputField").value.trim();
            if(!pinVal) { return; }
            
            fetch('/api/verify-admin-pin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pin: pinVal })
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === 'success') {
                    window.location.href = data.redirect;
                } else {
                    const errBox = document.getElementById("modalErrorBox");
                    document.getElementById("errorMsgText").innerText = data.message;
                    errBox.style.display = "flex";
                    document.getElementById("adminPinInputField").value = "";
                }
            });
        }
        document.getElementById("adminPinInputField").addEventListener("keyup", function(event) {
            if (event.key === "Enter") { submitAdminPin(); }
        });
    </script>

    <div class="footer-copyright">
        Create by Minh Khoa <span>Phiên bản: 1.0 (beta)</span>
    </div>

</body>
</html>
